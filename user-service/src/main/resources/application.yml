server:
  port: 8081

spring:
  application:
    name: user-service

  # 1. PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/medical_db
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver
    hikari:
      max-lifetime: 600000
      connection-timeout: 30000
      idle-timeout: 300000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # 3. Keycloak
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/medical-realm

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true