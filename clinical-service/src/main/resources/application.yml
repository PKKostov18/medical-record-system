server:
  port: 8082

spring:
  application:
    name: clinical-service
  datasource:
    url: jdbc:postgresql://localhost:5432/medical_db
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/medical-realm